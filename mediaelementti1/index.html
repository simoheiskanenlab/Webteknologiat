<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuvakaruselli</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <section id="karuselli">
    <h2>Kissakuvia</h2>
    <img id="slide-img" src="" alt="">
    <p id="slide-caption"></p>
    <div class="controls">
      <button id="btn-prev" onclick="edellinenKuva()">
        <i class="bi bi-arrow-left"></i>
      </button>
      <button id="btn-stop" onclick="kaynnistaTaiPysayta()">
        <i class="bi bi-play-fill"></i>
      </button>
      <button id="btn-next" onclick="seuraavaKuva()">
        <i class="bi bi-arrow-right"></i>
      </button>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="js/slider.js"></script>
</body>
</html>
