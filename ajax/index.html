<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NumbersAPI – REST-rajapintaharjoitus</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/base/jquery-ui.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-fluid">
  <div class="row g-4">

    <div class="col-md-6">
      <div class="box">
        <h2>NumbersAPI</h2>
        <p class="text-muted">Mielenkiintoista tietoa numeroista.</p>

        <button id="btn-hae" class="btn btn-info text-white fw-bold">HAE</button>

        <div id="loader" class="mt-3">
          <img src="https://i.gifer.com/ZZ5H.gif" alt="Ladataan..." width="50">
          <span class="ms-2 text-muted">Haetaan tietoa...</span>
        </div>

        <p class="mt-3 mb-0"><strong>Laskuri: <span id="counter">0</span></strong></p>
        <div id="results" class="mt-3"></div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="box">
        <h4>jQueryn Accordion plugin</h4>
        <div id="jq-accordion" class="mt-2 mb-4"></div>

        <h4>Bootstrapin Accordion-komponentti</h4>
        <div class="accordion mt-2" id="bs-accordion"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
