<!DOCTYPE html>
<html lang="fi">
<head>
    <title>Webteknologiat - Koti</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link type="text/css" rel="stylesheet" href="css/styles.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

    <div class="container mt-4">

        <iframe id="map-frame"
                src=""
                width="740"
                height="450"
                frameBorder="0">
        </iframe>

        <div class="d-flex align-items-center gap-2 mt-2">
            <label for="addr-field">Katuosoite:</label>
            <input type="text" id="addr-field" class="form-control" style="width: 200px;" placeholder="esim. Yliopistonkatu 36">

            <label for="city-field">Kaupunki:</label>
            <input type="text" id="city-field" class="form-control" style="width: 200px;" placeholder="esim. Lappeenranta">

            <button type="button" class="btn btn-primary" onclick="searchMap()">Hae</button>
        </div>

    </div>

    <script defer src="js/helloworld.js"></script>
</body>
</html>
