<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mediagalleria</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-label">Mediagalleria</div>
    <h1>Kissakuvat</h1>
    <p>Näytä lista tai ruudukko.</p>
    <div class="toolbar">
      <span class="item-count" id="item-count"></span>
      <div class="view-toggles">
        <button class="btn-view" id="btn-grid">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <rect x="0" y="0" width="7" height="7" rx="1"/>
            <rect x="9" y="0" width="7" height="7" rx="1"/>
            <rect x="0" y="9" width="7" height="7" rx="1"/>
            <rect x="9" y="9" width="7" height="7" rx="1"/>
          </svg>
          Ruudukko
        </button>
        <button class="btn-view" id="btn-list">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <rect x="0" y="1" width="16" height="2.5" rx="1"/>
            <rect x="0" y="6.5" width="16" height="2.5" rx="1"/>
            <rect x="0" y="12" width="16" height="2.5" rx="1"/>
          </svg>
          Lista
        </button>
      </div>
    </div>
  </div>
</header>

<main>
  <div id="media-container" class="grid-view"></div>
</main>

<script src="js/galleria.js"></script>
</body>
</html>
